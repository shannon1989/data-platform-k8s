kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kind

nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            system-reserved: "cpu=100m,memory=128Mi"
            kube-reserved: "cpu=100m,memory=128Mi"
            eviction-hard: "memory.available<150Mi"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80
      - containerPort: 30443
        hostPort: 443